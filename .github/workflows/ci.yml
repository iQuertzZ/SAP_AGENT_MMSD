name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: ruff check
        run: ruff check backend/ --output-format=github

      - name: mypy
        run: mypy backend/app/ --ignore-missing-imports

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Job 2: Backend tests ──────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sap_copilot_test
          POSTGRES_USER: sap_user
          POSTGRES_PASSWORD: sap_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sap_user -d sap_copilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ""
      TEST_DATABASE_URL: postgresql+asyncpg://sap_user:sap_pass@localhost:5432/sap_copilot_test
      ANTHROPIC_API_KEY: "sk-ant-test-fake-key-not-real"
      SAP_CONNECTOR: mock
      SECRET_KEY: "ci-test-secret-key-minimum-32-characters-long"
      APP_ENV: development
      FIRST_ADMIN_EMAIL: admin@sap-copilot.local
      FIRST_ADMIN_PASSWORD: changeme

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: DATABASE_URL=$TEST_DATABASE_URL alembic upgrade head

      - name: Run tests with coverage
        run: |
          python -m pytest backend/tests/ -v \
            --cov=backend/app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -x

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Job 3: Frontend build ─────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript build
        working-directory: frontend
        run: npm run build

  # ── Job 4: Docker build + push ────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine branch tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "branch_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "branch_tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.tag.outputs.branch_tag }}
            ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            VERSION=1.0.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.tag.outputs.branch_tag }}
            ghcr.io/${{ github.repository }}/frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test backend image
        run: |
          docker pull ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }}
          docker run --rm \
            -e SAP_CONNECTOR=mock \
            -e SECRET_KEY=ci-test-secret-key-minimum-32-characters-long \
            ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }} \
            python -c "from backend.app.main import app; print('Import OK')"

  # ── Job 5: Deploy to production ───────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
            docker compose exec -T backend alembic upgrade head
            docker system prune -f
            curl -f http://localhost:8000/api/v1/health || exit 1
            echo "Deployment successful"
