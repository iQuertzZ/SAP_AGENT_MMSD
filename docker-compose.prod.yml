---
# SAP MM/SD AI Copilot — PRODUCTION standalone stack
# NOT an override file — use directly:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Required environment variables (export before running, or use a .env.prod file):
#   SECRET_KEY            openssl rand -hex 32
#   DATABASE_URL          postgresql+asyncpg://user:pass@host:5432/sap_copilot
#   POSTGRES_PASSWORD     strong DB password
#   FIRST_ADMIN_PASSWORD  strong admin password
#   ANTHROPIC_API_KEY     sk-ant-...  (optional)

networks:
  sap_copilot_net:
    driver: bridge

volumes:
  postgres_data_prod:

services:

  # ── PostgreSQL (no host port in prod) ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sap_copilot_db
    networks:
      - sap_copilot_net
    environment:
      POSTGRES_DB: sap_copilot
      POSTGRES_USER: sap_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # No ports: — DB not reachable from outside the Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sap_user -d sap_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ── Backend (gunicorn + 4 uvicorn workers) ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sap_copilot_backend
    networks:
      - sap_copilot_net
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://sap_user:${POSTGRES_PASSWORD}@db:5432/sap_copilot}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      SAP_CONNECTOR: ${SAP_CONNECTOR:-mock}
      EXECUTION_ENABLED: ${EXECUTION_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@sap-copilot.local}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:?FIRST_ADMIN_PASSWORD must be set}
    ports:
      - "8000:8000"
    # Code is baked into the image — no volume mount
    command:
      - sh
      - -c
      - "alembic upgrade head && gunicorn backend.app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 --timeout 120 --access-logfile - --error-logfile -"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: always

  # ── Nginx (optional — uncomment and add nginx/nginx.conf to enable) ─────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: sap_copilot_nginx
  #   networks:
  #     - sap_copilot_net
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./frontend:/usr/share/nginx/html/static:ro
  #   depends_on:
  #     - backend
  #   restart: always

  # ── Daily DB backup (optional — requires a backup volume) ──────────────────
  # db-backup:
  #   image: prodrigestivill/postgres-backup-local
  #   container_name: sap_copilot_db_backup
  #   networks:
  #     - sap_copilot_net
  #   depends_on:
  #     - db
  #   environment:
  #     POSTGRES_HOST: db
  #     POSTGRES_DB: sap_copilot
  #     POSTGRES_USER: sap_user
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     SCHEDULE: "@daily"
  #     BACKUP_KEEP_DAYS: 7
  #   volumes:
  #     - ./backups:/backups
  #   restart: always
